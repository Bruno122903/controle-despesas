<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raimundo Gastos</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="style.css">
    
    <!-- Configurações PWA Android -->
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" sizes="192x192" href="painalancha.jpeg">
</head>
<body class="dark-mode">
    <div class="app-shell">
        
        <!-- ABA LANÇAMENTO -->
        <main id="aba-anotar" class="content-section active">
            <header class="app-header">
                <div class="profile-container">
                    <img src="painalancha.jpeg" alt="Raimundo" class="avatar">
                    <div class="user-info">
                        <h1>Olá, Raimundo</h1>
                        <p>Controle de despesas</p>
                    </div>
                </div>
            </header>

            <div class="card-input">
                <div class="input-group">
                    <label>Descrição</label>
                    <input type="text" id="item" placeholder="O que você comprou?" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Valor Pago</label>
                    <input type="number" id="valor" placeholder="R$ 0,00" step="0.01" inputmode="decimal">
                </div>
                <button onclick="salvarGasto()" class="btn-main">Lançar Gasto</button>
            </div>

            <div class="recent-section">
                <div class="section-header">
                    <h2>Atividades Recentes</h2>
                    <button class="btn-view-all" onclick="mudarAba('perfil')">Histórico</button>
                </div>
                <div id="lista-curta" class="activity-list"></div>
            </div>
        </main>

        <!-- ABA HISTÓRICO -->
        <main id="aba-perfil" class="content-section">
            <header class="app-header">
                <h1>Meu Perfil</h1>
                <div class="filter-chips">
                    <button onclick="filtrar('dia', event)" class="chip">Hoje</button>
                    <button onclick="filtrar('mes', event)" class="chip">Mês</button>
                    <button onclick="filtrar('todos', event)" class="chip active">Tudo</button>
                </div>
            </header>

            <div id="tabela-corpo" class="history-list"></div>
        </main>

        <!-- DASHBOARD DE TOTAL -->
        <div class="total-dashboard">
            <span class="total-label">Total Gasto</span>
            <span class="total-value">R$ <span id="valor-total">0,00</span></span>
        </div>

        <!-- NAVEGAÇÃO -->
        <nav class="tab-bar">
            <button class="tab-btn active" id="btn-anotar" onclick="mudarAba('anotar')">
                <span class="icon">🏠</span>
                <span class="label">Início</span>
            </button>
            <button class="tab-btn" id="btn-perfil" onclick="mudarAba('perfil')">
                <span class="icon">📊</span>
                <span class="label">Perfil</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
