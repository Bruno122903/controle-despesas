<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle de Gastos</title>
    <!-- Faz o site abrir sem a barra do navegador (modo app) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Raimundo App">

<!-- Ícone que vai aparecer na tela inicial (usa a mesma imagem do topo) -->
<link rel="apple-touch-icon" href="painalancha.jpeg">
<link rel="icon" href="painalancha.jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Topo com a imagem centralizada -->
        <div class="Imagem">
            <img src="painalancha.jpeg" width="100" alt="Logo">
        </div>
        
        <h1>Raimundo Despesas</h1> 

        <!-- Grupo de entrada de dados -->
        <div class="form-grupo">
            <input type="text" id="categoriaGasto" placeholder="Em que gastou? (Ex: Gasolina)">
            <input type="number" id="valorGasto" placeholder="Valor R$">
            <button onclick="adicionarGasto()"> Adicionar à Lista</button>
        </div>

        <!-- Lista de Gastos Interligada -->
        <div class="resumo">
            <h3>Lista de Gastos</h3>
            <div class="quadro-lista">
                <ul id="lista">
                    <!-- Os itens do script.js aparecerão aqui -->
                </ul>
            </div>
        </div>

        <!-- Seção de Total -->
        <div class="total-section">
            <h4>Total Acumulado:</h4>
            <p>R$ <span id="total">0.00</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
